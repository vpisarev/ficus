name: fxtest CI

# Layered test ladder (tools/fxtest): unit + negative + ir + corpus(O0,O3) on
# every push/PR; the heavier axes (extra opt levels, -c++ / OpenMP smoke) run
# nightly to stay within the per-leg time budget.

on:
  # Only push-to-master triggers a push run; feature branches are covered by the
  # pull_request event instead. This avoids the duplicate run (push + PR) that
  # fires for every commit to a branch with an open PR -- 3 matrix legs, not 6.
  # (A branch with no PR yet gets CI once its PR is opened.)
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 5 * * *"   # nightly, 05:00 UTC
  workflow_dispatch:
    inputs:
      nightly:
        description: "run the full nightly axes"
        type: boolean
        default: false

# Cancel a still-running run when a newer commit for the same ref arrives, so
# rapid pushes to a PR don't pile up superseded runs. Only PR runs are cancelled
# -- master runs are left to finish so the mainline keeps a complete CI record
# (useful for bisecting). Flip cancel-in-progress to `true` to also cancel master.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fxtest:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc,   cxx: g++ }
          - { os: ubuntu-latest, cc: clang, cxx: clang++ }
          - { os: macos-latest,  cc: clang, cxx: clang++ }   # arm64
    env:
      # ficus reads $CC/$CXX to compile the generated C/C++ (Compiler.fx).
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # so `git describe` in the Makefile works

      - name: Install deps
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            # gcc ships libgomp; clang's -fopenmp needs libomp-dev (nightly smoke).
            sudo apt-get update -qq
            sudo apt-get install -y libomp-dev
          fi
          # macOS: OpenMP (libomp.a) is bundled in runtime/lib/macos_arm64 -- no install.

      - name: Show toolchain
        run: |
          "${CC}" --version | head -1
          python3 --version

      # Cache the bootstrap objects + built compiler; invalidated when the
      # compiler/runtime/stdlib sources or the toolchain change.
      - name: Cache ficus build
        uses: actions/cache@v4
        with:
          path: |
            __fxbuild__/bootstrap
            bin/ficus
          key: ficus-${{ matrix.os }}-${{ matrix.cc }}-${{ hashFiles('compiler/**', 'lib/**', 'runtime/**', 'compiler/bootstrap/**') }}

      - name: Build ficus
        run: make -j"$(getconf _NPROCESSORS_ONLN)"

      # Guard the self-hosting invariant: the checked-in compiler/bootstrap/*.c
      # must match what the freshly-built compiler regenerates, so a fresh clone
      # always builds the updated compiler (a stale bootstrap drifts silently and
      # eventually can't compile the sources). Runs on ONE leg only (the emitted C
      # is machine-independent) and reuses the just-built bin/ficus (--no-make, no
      # extra compiler build). Skipped when the PR/push didn't touch compiler/lib/
      # runtime -- a stale bootstrap is impossible then, so no CI time is spent.
      - name: Bootstrap up-to-date check
        if: matrix.cc == 'gcc' && matrix.os == 'ubuntu-latest'
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -n "$base" ] && git rev-parse --verify -q "$base^{commit}" >/dev/null; then
            if git diff --quiet "$base" HEAD -- compiler lib runtime; then
              echo "no compiler/lib/runtime changes since $base -> bootstrap cannot be stale; skipping"
              exit 0
            fi
          fi
          python3 tools/update_compiler.py --check --no-make

      # Guard: stdlib generic operators must annotate their return type -- the
      # annotation is a viability filter for overload resolution (FB-007
      # near-miss: dropping it broke the compiler's own build). <1s, one leg.
      - name: Operator return-annotation lint
        if: matrix.cc == 'gcc' && matrix.os == 'ubuntu-latest'
        run: python3 tools/lint_op_returns.py lib

      # Guard (annotate-2): every module-level function in the annotated stdlib
      # scope must spell its return type. Same viability-filter rationale as the
      # operator lint, extended to functions and enforced by the compiler's own
      # -Wimplicit-rettype (accurate about nesting; the textual --funs mode is
      # not). Cheap -no-c pass. Scope excludes NN/Onnx/Protobuf/OpenCV.
      - name: Return-type gate (-Wimplicit-rettype -Werror over stdlib)
        if: matrix.cc == 'gcc' && matrix.os == 'ubuntu-latest'
        run: bash tools/rettype_gate.sh bin/ficus

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.nightly }}" = "true" ]; then
            echo "nightly=true" >> "$GITHUB_OUTPUT"
          else
            echo "nightly=false" >> "$GITHUB_OUTPUT"
          fi

      # PR-level: unit + negative + ir + corpus(O0,O3)
      - name: fxtest all
        run: python3 tools/fxtest/fxtest.py all --jobs "$(getconf _NPROCESSORS_ONLN)"

      # Nightly-only heavier axes: extra opt level + -c++ / OpenMP smoke.
      - name: fxtest nightly axes
        if: steps.mode.outputs.nightly == 'true'
        run: |
          python3 tools/fxtest/fxtest.py corpus --opt O0,O1,O3 \
            --cpp-smoke --openmp-smoke --jobs "$(getconf _NPROCESSORS_ONLN)"

      # Nightly: FB-008 generated-C stability. Rebuilds the whole compiler a few
      # times (~1 min each), so it is too slow for the PR leg.
      - name: fxtest determinism (FB-008)
        if: steps.mode.outputs.nightly == 'true'
        run: python3 tools/fxtest/fxtest.py determinism --rebuilds 2

      # Nightly: run test_all (+ T5 suites) under ASan+UBSan to catch silent UB
      # (the FB-005 class). Slow (~2 min).
      - name: fxtest sanitize (ASan+UBSan)
        if: steps.mode.outputs.nightly == 'true'
        run: python3 tools/fxtest/fxtest.py sanitize

      # On failure, keep the generated C and build dirs for post-mortem.
      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fxtest-build-${{ matrix.os }}-${{ matrix.cc }}
          path: |
            build/fxtest
          if-no-files-found: ignore
          retention-days: 7
